<!DOCTYPE html>

<meta charset="UTF-8">
<title>Paw Palace - Pet Care & Grooming App</title>

<style>
body{
    background:#f2f2f2;
    font-family:Arial,sans-serif;
    margin:20px;
}

h1{
    text-align:center;
}

.container{
    display:flex;
    flex-wrap:wrap;
    gap:25px;
    justify-content:center;
}

.phone{
    width:250px;
    transition:0.3s;
}

.phone:hover{
    transform:translateY(-10px);
}

.phone img{
    width:100%;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.label{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🐾 Paw Palace – Pet Care & Grooming App UI</h1>

<div class="container">

<div class="phone">
<img src="Screenshots/1.Splash Screen.png">

</div>

<div class="label">Loading 1</div>
</div>

<div class="phone">
<img src="Screenshots/3.Splash Screen2.png">
<div class="label">Loading 2</div>
</div>

</div>

</div>
